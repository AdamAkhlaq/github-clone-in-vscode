<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<style>
			:root {
				--bg: #ffffff;
				--border: #d1d9e0;
				--fg: #1f2328;
				--muted: #59636e;
				--sans:
					"SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI",
					sans-serif;
				--mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
			}
			* { box-sizing: border-box; }
			html, body { margin: 0; }
			.stage {
				position: relative;
				width: 440px;
				height: 280px;
				overflow: hidden;
				background: radial-gradient(540px 380px at 86% 12%, #ffffff 0%, #eef1f5 100%);
				font-family: var(--sans);
				color: var(--fg);
				padding: 30px 32px;
				display: flex;
				flex-direction: column;
				justify-content: center;
			}
			.eyebrow {
				font-family: var(--mono);
				font-size: 11px;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: var(--muted);
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 15px;
			}
			.eyebrow .chrome { width: 15px; height: 15px; display: block; }
			/* icon to the left of the name, on one level */
			.lockup {
				display: flex;
				align-items: center;
				gap: 15px;
				margin-bottom: 16px;
			}
			.appicon {
				width: 54px; height: 54px; flex-shrink: 0; border-radius: 13px;
				background: #fff; border: 3px solid #1f2328;
				display: flex; align-items: center; justify-content: center;
			}
			.appicon svg { width: 39px; height: 39px; }
			h1 {
				margin: 0;
				font-size: 38px;
				font-weight: 800;
				line-height: 1;
				letter-spacing: -0.025em;
			}
			h1 .anywhere {
				background: linear-gradient(95deg, #1f6feb, #0fae96);
				-webkit-background-clip: text;
				background-clip: text;
				color: transparent;
			}
			h1 .for {
				display: block; font-weight: 650; color: var(--muted);
				font-size: 23px; margin-top: 2px;
			}
			.tagline {
				margin: 0;
				font-size: 14px;
				line-height: 1.45;
				color: #424a53;
				max-width: 360px;
			}
		</style>
	</head>
	<body>
		<div class="stage">
			<div class="eyebrow">
				<svg class="chrome" viewBox="0 0 48 48" aria-hidden="true">
					<defs>
						<linearGradient id="chrome-red" x1="3.2173" y1="15" x2="44.7812" y2="15" gradientUnits="userSpaceOnUse">
							<stop offset="0" stop-color="#d93025" /><stop offset="1" stop-color="#ea4335" />
						</linearGradient>
						<linearGradient id="chrome-yellow" x1="20.7219" y1="47.6791" x2="41.5039" y2="11.6837" gradientUnits="userSpaceOnUse">
							<stop offset="0" stop-color="#fcc934" /><stop offset="1" stop-color="#fbbc04" />
						</linearGradient>
						<linearGradient id="chrome-green" x1="26.5981" y1="46.5015" x2="5.8161" y2="10.506" gradientUnits="userSpaceOnUse">
							<stop offset="0" stop-color="#1e8e3e" /><stop offset="1" stop-color="#34a853" />
						</linearGradient>
					</defs>
					<circle cx="24" cy="23.9947" r="12" fill="#fff" />
					<path d="M24,12H44.7812a23.9939,23.9939,0,0,0-41.5639.0029L13.6079,30l.0093-.0024A11.9852,11.9852,0,0,1,24,12Z" fill="url(#chrome-red)" />
					<circle cx="24" cy="24" r="9.5" fill="#1a73e8" />
					<path d="M34.3913,30.0029,24.0007,48A23.994,23.994,0,0,0,44.78,12.0031H23.9989l-.0025.0093A11.985,11.985,0,0,1,34.3913,30.0029Z" fill="url(#chrome-yellow)" />
					<path d="M13.6086,30.0031,3.218,12.006A23.994,23.994,0,0,0,24.0025,48L34.3931,30.0029l-.0067-.0068a11.9852,11.9852,0,0,1-20.7778.007Z" fill="url(#chrome-green)" />
				</svg>
				Chrome extension
			</div>
			<div class="lockup">
				<div class="appicon">
					<svg viewBox="0 0 64 64" aria-hidden="true">
						<g fill="none" stroke="#1f2328" stroke-width="6"
							stroke-linecap="round" stroke-linejoin="round">
							<line x1="21" y1="21" x2="21" y2="43" />
							<path d="M44 21 C44 31 32 33 23.5 33" />
							<circle cx="21" cy="14.5" r="6" fill="#ffffff" />
							<circle cx="21" cy="49.5" r="6" fill="#ffffff" />
							<circle cx="44" cy="14.5" r="6" fill="#ffffff" />
						</g>
					</svg>
				</div>
				<h1>
					Clone <span class="anywhere">Anywhere</span>
					<span class="for">for GitHub</span>
				</h1>
			</div>
			<p class="tagline">
				Clone any GitHub repository straight into your editor — or grab it as a
				.zip — one click, no terminal.
			</p>
		</div>
	</body>
</html>
