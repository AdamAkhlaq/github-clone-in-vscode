<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<style>
			:root {
				--bg: #ffffff;
				--subtle: #f6f8fa;
				--border: #d1d9e0;
				--border-soft: #e4e8ed;
				--fg: #1f2328;
				--muted: #59636e;
				--faint: #818b98;
				--green: #1f883d;
				--orange: #fd8c73;
				--sans: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				--mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
			}
			* { box-sizing: border-box; }
			html, body { margin: 0; }
			.stage {
				position: relative;
				width: 1280px;
				height: 800px;
				overflow: hidden;
				background: radial-gradient(1100px 900px at 70% 24%, #ffffff 0%, #eaeef3 100%);
				font-family: var(--sans);
				color: var(--fg);
				display: flex;
				align-items: center;
			}
			.left {
				width: 560px;
				flex-shrink: 0;
				padding: 0 40px 0 96px;
			}
			.brand {
				display: flex; align-items: center; gap: 13px; margin-bottom: 40px;
			}
			.brand .ico {
				width: 46px; height: 46px; border-radius: 11px; flex-shrink: 0;
				background: #fff; border: 3px solid #1f2328;
				display: flex; align-items: center; justify-content: center;
			}
			.brand .ico svg { width: 33px; height: 33px; }
			.brand .name { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
			.headline {
				margin: 0; font-size: 56px; font-weight: 800; line-height: 1.02;
				letter-spacing: -0.03em;
			}
			.headline .accent {
				background: linear-gradient(95deg, var(--c1), var(--c2));
				-webkit-background-clip: text; background-clip: text; color: transparent;
			}
			.sub {
				margin: 22px 0 0; font-size: 19px; line-height: 1.5; color: #424a53;
				max-width: 400px;
			}
			.chip {
				display: inline-flex; align-items: center; gap: 10px; margin-top: 30px;
				padding: 9px 16px 9px 12px; background: #fff; border: 1px solid var(--border);
				border-radius: 999px; font-size: 15px; font-weight: 600;
				box-shadow: 0 1px 2px rgba(31,35,40,0.05);
			}
			.chip .g { width: 22px; height: 22px; display: flex; }
			.chip .g svg { width: 100%; height: 100%; }

			.right { flex: 1; display: flex; align-items: center; justify-content: center; }

			/* GitHub Code dropdown */
			.source { transform: scale(1.18); transform-origin: center; }
			.code-btn {
				display: inline-flex; align-items: center; gap: 7px; background: var(--green);
				color: #fff; font-size: 15px; font-weight: 600; padding: 9px 13px;
				border-radius: 7px; box-shadow: 0 1px 2px rgba(31,35,40,0.2);
			}
			.code-btn svg { width: 16px; height: 16px; fill: #fff; }
			.code-btn .caret {
				width: 0; height: 0; margin-left: 3px; border-left: 4px solid transparent;
				border-right: 4px solid transparent; border-top: 5px solid #fff;
			}
			.menu {
				margin-top: 10px; width: 332px; background: #fff; border: 1px solid var(--border);
				border-radius: 12px; box-shadow: 0 18px 48px rgba(31,35,40,0.22); overflow: hidden;
			}
			.tabs { display: flex; border-bottom: 1px solid var(--border); }
			.tabs span { flex: 1; text-align: center; padding: 12px; font-size: 14px; font-weight: 600; color: var(--muted); }
			.tabs .on { color: var(--fg); box-shadow: inset 0 -2px 0 var(--fg); }
			.mbody { padding: 14px 14px 6px; }
			.clone-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; }
			.clone-head .lhs { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 600; }
			.clone-head .lhs svg { width: 16px; height: 16px; fill: var(--fg); }
			.help {
				width: 17px; height: 17px; border-radius: 50%; border: 1.4px solid var(--faint);
				color: var(--faint); font-size: 11px; font-weight: 700; line-height: 14px;
				text-align: center; font-family: var(--mono);
			}
			.subtabs { display: flex; gap: 17px; border-bottom: 1px solid var(--border-soft); margin-bottom: 13px; }
			.subtabs span { padding-bottom: 9px; font-size: 13.5px; color: var(--muted); font-weight: 500; white-space: nowrap; }
			.subtabs .on { color: var(--fg); font-weight: 600; box-shadow: inset 0 -2px 0 var(--orange); }
			.dl-btn {
				display: block; width: 100%; text-align: center; background: var(--green);
				color: #fff; font-size: 15px; font-weight: 600; padding: 11px; border-radius: 7px;
				border: 1px solid rgba(31,35,40,0.12); box-shadow: 0 1px 2px rgba(31,35,40,0.12);
			}
			.caption { margin: 11px 2px 0; font-size: 13px; line-height: 1.4; color: var(--muted); }
			.native-group { border-top: 1px solid var(--border-soft); margin-top: 13px; }
			.native { display: flex; align-items: center; gap: 11px; padding: 11px 14px; font-size: 13.5px; color: #424a53; }
			.native svg { width: 16px; height: 16px; fill: var(--faint); flex-shrink: 0; }

			/* Popup chooser */
			.popup {
				transform: scale(1.18); transform-origin: center;
				width: 300px; background: #fff; border: 1px solid var(--border);
				border-radius: 14px; box-shadow: 0 18px 48px rgba(31,35,40,0.22);
				padding: 18px; font-size: 14px;
			}
			.popup .phead { display: flex; align-items: center; gap: 11px; margin-bottom: 4px; }
			.popup .phead .pico {
				width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
				background: #fff; border: 2.5px solid #1f2328; display: flex; align-items: center; justify-content: center;
			}
			.popup .phead .pico svg { width: 27px; height: 27px; }
			.popup .phead .pname { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
			.popup .ptag { font-size: 12px; color: var(--muted); line-height: 1.4; margin: 0 0 14px; }
			.popup .plabel {
				font-family: var(--mono); font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em;
				text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
			}
			.opt {
				display: flex; align-items: center; gap: 11px; padding: 8px 9px; border-radius: 7px;
				border: 1px solid transparent;
			}
			.opt.sel { background: var(--subtle); border-color: var(--border); }
			.opt .og { width: 18px; height: 18px; display: flex; flex-shrink: 0; }
			.opt .og svg { width: 100%; height: 100%; }
			.opt .ol { flex: 1; font-size: 13.5px; }
			.opt .chk { width: 13px; height: 13px; }
			.opt .chk svg { width: 100%; height: 100%; stroke: #0969da; }
		</style>
	</head>
	<body>
		<div class="stage" id="stage"></div>
		<script>
			const APPICON = '<svg viewBox="0 0 64 64"><g fill="none" stroke="#1f2328" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="21" x2="21" y2="43"/><path d="M44 21 C44 31 32 33 23.5 33"/><circle cx="21" cy="14.5" r="6" fill="#fff"/><circle cx="21" cy="49.5" r="6" fill="#fff"/><circle cx="44" cy="14.5" r="6" fill="#fff"/></g></svg>';
			const CODEICON = '<svg viewBox="0 0 16 16"><path d="M4.72 3.22a.75.75 0 0 1 1.06 1.06L2.06 8l3.72 3.72a.75.75 0 1 1-1.06 1.06L.47 8.53a.75.75 0 0 1 0-1.06l4.25-4.25Zm6.56 0a.75.75 0 1 0-1.06 1.06L13.94 8l-3.72 3.72a.75.75 0 1 0 1.06 1.06l4.25-4.25a.75.75 0 0 0 0-1.06l-4.25-4.25Z"/></svg>';
			const TERMINAL = '<svg viewBox="0 0 16 16"><path d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0 1 14.25 15H1.75A1.75 1.75 0 0 1 0 13.25Zm1.75-.25a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V2.75a.25.25 0 0 0-.25-.25ZM7.25 8a.75.75 0 0 1-.22.53l-2.25 2.25a.75.75 0 0 1-1.06-1.06L5.44 8 3.72 6.28a.75.75 0 1 1 1.06-1.06l2.25 2.25c.141.14.22.331.22.53Zm1.5 1.5h3a.75.75 0 0 1 0 1.5h-3a.75.75 0 0 1 0-1.5Z"/></svg>';
			const DESKTOP = '<svg viewBox="0 0 16 16"><path d="M14.25 1c.966 0 1.75.784 1.75 1.75v7.5A1.75 1.75 0 0 1 14.25 12h-3.727c.099 1.041.52 1.872 1.292 2.757A.75.75 0 0 1 11.25 16h-6.5a.75.75 0 0 1-.565-1.243c.772-.885 1.192-1.716 1.292-2.757H1.75A1.75 1.75 0 0 1 0 10.25v-7.5C0 1.784.784 1 1.75 1ZM1.75 2.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>';
			const FILEZIP = '<svg viewBox="0 0 16 16"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>';
			const CHECK = '<svg viewBox="0 0 13 13" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 7 5.5 10l5-6.5"/></svg>';

			// Brand glyphs (from the extension's clone-targets), filled per target.
			const G = {
				vscode: (c) => `<svg viewBox="0 0 128 128"><path fill-rule="evenodd" fill="${c}" d="M90.767 127.126a7.968 7.968 0 0 0 6.35-.244l26.353-12.681a8 8 0 0 0 4.53-7.209V21.009a8 8 0 0 0-4.53-7.21L97.117 1.12a7.97 7.97 0 0 0-9.093 1.548l-50.45 46.026L15.6 32.013a5.328 5.328 0 0 0-6.807.302l-7.048 6.411a5.335 5.335 0 0 0-.006 7.888L20.796 64 1.74 81.387a5.336 5.336 0 0 0 .006 7.887l7.048 6.411a5.327 5.327 0 0 0 6.807.303l21.974-16.68 50.45 46.025a7.96 7.96 0 0 0 2.743 1.793Zm5.252-92.183L57.74 64l38.28 29.058V34.943Z"/></svg>`,
				cursor: (c) => `<svg viewBox="0 0 24 24"><path fill="${c}" d="M11.503.131 1.891 5.678a.84.84 0 0 0-.42.726v11.188c0 .3.162.575.42.724l9.609 5.55a1 1 0 0 0 .998 0l9.61-5.55a.84.84 0 0 0 .42-.724V6.404a.84.84 0 0 0-.42-.726L12.497.131a1.01 1.01 0 0 0-.996 0M2.657 6.338h18.55c.263 0 .43.287.297.515L12.23 22.918c-.062.107-.229.064-.229-.06V12.335a.59.59 0 0 0-.295-.51l-9.11-5.257c-.109-.063-.064-.23.061-.23"/></svg>`,
				windsurf: (c) => `<svg viewBox="0 0 24 24"><path fill="${c}" d="M23.55 5.067c-1.2038-.002-2.1806.973-2.1806 2.1765v4.8676c0 .972-.8035 1.7594-1.7597 1.7594-.568 0-1.1352-.286-1.4718-.7659l-4.9713-7.1003c-.4125-.5896-1.0837-.941-1.8103-.941-1.1334 0-2.1533.9635-2.1533 2.153v4.8957c0 .972-.7969 1.7594-1.7596 1.7594-.57 0-1.1363-.286-1.4728-.7658L.4076 5.1598C.2822 4.9798 0 5.0688 0 5.2882v4.2452c0 .2147.0656.4228.1884.599l5.4748 7.8183c.3234.462.8006.8052 1.3509.9298 1.3771.313 2.6446-.747 2.6446-2.0977v-4.893c0-.972.7875-1.7593 1.7596-1.7593h.003a1.798 1.798 0 0 1 1.4718.7658l4.9723 7.0994c.4135.5905 1.05.941 1.8093.941 1.1587 0 2.1515-.9645 2.1515-2.153v-4.8948c0-.972.7875-1.7594 1.7596-1.7594h.194a.22.22 0 0 0 .2204-.2202v-4.622a.22.22 0 0 0-.2203-.2203Z"/></svg>`,
				vscodium: (c) => `<svg viewBox="0 0 24 24"><path fill="${c}" d="M11.583.54a1.467 1.467 0 0 0-.441 2.032c2.426 3.758 2.999 6.592 2.75 9.075-1.004 4.756-3.187 5.721-5.094 5.721-1.863 0-1.364-3.065.036-3.962.836-.522 1.906-.861 2.728-.861.814 0 1.474-.658 1.474-1.47 0-.812-.66-1.47-1.474-1.47-.96 0-1.901.202-2.78.545.18-.847.246-1.762.014-2.735-.352-1.477-1.367-2.889-3.128-4.257a1.476 1.476 0 0 0-2.069.256c-.5.64-.384 1.564.259 2.063 1.435 1.114 1.908 1.939 2.07 2.618.162.679.032 1.407-.293 2.408-.416 1.349-.9 2.553-1.11 3.708-.105.568-.114 1.187-.14 1.68-1.034-1.006-1.438-2.336-1.438-4.279 0-.811-.66-1.47-1.474-1.47-.814.001-1.473.659-1.473 1.47 0 2.654.776 5.179 2.855 6.863 1.883 1.793 6.67 1.13 6.67 4.01 0 .812 1.19 1.208 2.004 1.208.834 0 1.885-.558 1.885-1.208 0-3.267 3.443-5.253 9.11-5.244A1.472 1.472 0 0 0 24 15.773 1.472 1.472 0 0 0 22.53 14.3c-.388 0-.765.013-1.138.035.634-1.49.915-3.13.857-4.903a1.473 1.473 0 0 0-1.522-1.42 1.472 1.472 0 0 0-1.425 1.517c.076 2.32-.01 4.393-1.74 5.485-.49.31-1.062.58-1.604.58.42-1.145.738-2.353.869-3.655.083-.83.091-1.818-.003-2.585-.148-1.188-.325-2.535.126-3.55.405-.874 1.313-1.24 2.645-1.24.814 0 1.473-.659 1.473-1.47 0-.811-.659-1.47-1.473-1.47-1.98 0-3.481 1.042-4.332 2.3-.445-.95-.987-1.929-1.642-2.943a1.474 1.474 0 0 0-2.037-.44z"/></svg>`,
				folder: (c) => `<svg viewBox="0 0 24 24"><path fill="${c}" d="M10 4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h6z"/></svg>`,
			};

			const TARGETS = {
				vscode:   { tab: "VS Code",  btn: "Clone in VS Code",  cap: "Clone using VS Code.",  glyph: () => G.vscode("#007ACC"),  c1: "#1f6feb", c2: "#0098ff", head: "Straight into VS&nbsp;Code", chipName: "VS Code" },
				cursor:   { tab: "Cursor",   btn: "Clone in Cursor",   cap: "Clone using Cursor.",   glyph: () => G.cursor("#1f2328"),  c1: "#1f2328", c2: "#444c56", head: "Straight into Cursor", chipName: "Cursor" },
				windsurf: { tab: "Windsurf", btn: "Clone in Windsurf", cap: "Clone using Windsurf.", glyph: () => G.windsurf("#1f2328"), c1: "#0fae96", c2: "#15b8a6", head: "Straight into Windsurf", chipName: "Windsurf" },
				zip:      { tab: ".zip",     btn: "Download .zip",     cap: "Download the current branch as a .zip archive.", glyph: () => G.folder("#d4a200"), c1: "#1a7f37", c2: "#2da44e", head: "Grab it as a&nbsp;.zip", chipName: ".zip · current branch" },
			};

			function dropdown(t) {
				return `
				<div class="source">
					<span class="code-btn">${CODEICON}Code <span class="caret"></span></span>
					<div class="menu">
						<div class="tabs"><span class="on">Local</span><span>Codespaces</span></div>
						<div class="mbody">
							<div class="clone-head"><span class="lhs">${TERMINAL}Clone</span><span class="help">?</span></div>
							<div class="subtabs"><span class="on">${t.tab}</span><span>HTTPS</span><span>SSH</span><span>GitHub CLI</span></div>
							<span class="dl-btn">${t.btn}</span>
							<p class="caption">${t.cap}</p>
						</div>
						<div class="native-group">
							<div class="native">${DESKTOP}Open with GitHub Desktop</div>
							<div class="native">${FILEZIP}Download ZIP</div>
						</div>
					</div>
				</div>`;
			}

			function chooser() {
				const rows = [
					{ g: G.folder("#d4a200"), l: ".zip" },
					{ g: G.cursor("#1f2328"), l: "Cursor" },
					{ g: G.vscode("#007ACC"), l: "VS Code", sel: true },
					{ g: G.windsurf("#1f2328"), l: "Windsurf" },
					{ g: G.vscodium("#2F80ED"), l: "VSCodium" },
					{ g: G.vscode("#1F9E84"), l: "VS Code Insiders" },
				].map(r => `<div class="opt ${r.sel ? "sel" : ""}"><span class="og">${r.g}</span><span class="ol">${r.l}</span>${r.sel ? `<span class="chk">${CHECK}</span>` : ""}</div>`).join("");
				return `<div class="popup">
					<div class="phead"><span class="pico">${APPICON}</span><span class="pname">Clone Anywhere</span></div>
					<p class="ptag">Clone any GitHub repo straight into your editor — or grab it as a .zip.</p>
					<div class="plabel">Clone destination</div>
					${rows}
				</div>`;
			}

			const v = new URLSearchParams(location.search).get("v") || "vscode";
			let leftHTML, rightHTML;
			if (v === "popup") {
				leftHTML = `
					<div class="brand"><span class="ico">${APPICON}</span><span class="name">Clone Anywhere for GitHub</span></div>
					<h1 class="headline">Set it once,<br><span class="accent" style="--c1:#1f6feb;--c2:#0fae96">clone anywhere</span></h1>
					<p class="sub">Pick your editor — or .zip — from the toolbar. The button on every repo updates to match.</p>`;
				rightHTML = chooser();
			} else {
				const t = TARGETS[v];
				leftHTML = `
					<div class="brand"><span class="ico">${APPICON}</span><span class="name">Clone Anywhere for GitHub</span></div>
					<h1 class="headline" style="--c1:${t.c1};--c2:${t.c2}">One click,<br><span class="accent">${t.head}</span></h1>
					<p class="sub">From any repo's Code menu — no copying URLs, no terminal.</p>
					<span class="chip"><span class="g">${t.glyph()}</span>${t.chipName}</span>`;
				rightHTML = dropdown(t);
			}
			document.getElementById("stage").innerHTML =
				`<section class="left">${leftHTML}</section><section class="right">${rightHTML}</section>`;
		</script>
	</body>
</html>
