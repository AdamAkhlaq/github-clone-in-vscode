<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Clone Anywhere for GitHub</title>
		<!-- External stylesheet + script only: MV3's default CSP forbids inline
		     styles and scripts, and the extension ships no remote assets. -->
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<!-- The GitHub mark appears twice (header source tile + footer link), so
		     its path is defined once here and referenced with <use>. Hidden via
		     .popup__defs in the stylesheet — symbols still resolve when not shown. -->
		<svg class="popup__defs" aria-hidden="true" focusable="false">
			<symbol id="gh-mark" viewBox="0 0 16 16">
				<path
					d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.27-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
				/>
			</symbol>
		</svg>

		<main class="popup">
			<header class="popup__header">
				<!-- Signature element: the source → destination handoff that states
				     what the extension does — take a repo from GitHub, open it in the
				     chosen editor. Decorative, so it's hidden from assistive tech; the
				     title below carries the name. The source mark is inlined SVG; the
				     destination tile is filled by popup.js with the selected editor's
				     brand glyph (in its brand colour) so it tracks the choice below. -->
				<div class="popup__handoff" aria-hidden="true">
					<span class="popup__tile popup__tile--source">
						<svg viewBox="0 0 16 16" fill="currentColor" focusable="false">
							<use href="#gh-mark" />
						</svg>
					</span>
					<svg
						class="popup__flow"
						viewBox="0 0 56 12"
						width="56"
						height="12"
						fill="none"
						focusable="false"
					>
						<path d="M2 6H49" stroke-width="3" stroke-linecap="round" />
						<path
							d="M49 1.5 54 6 49 10.5"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						/>
					</svg>
					<span class="popup__tile popup__tile--target" id="clone-target-tile">
					</span>
				</div>

				<h1 class="popup__title">Clone Anywhere for GitHub</h1>
				<p class="popup__tagline">
					Clone any GitHub repository straight into your editor — or grab it as
					a .zip — one click, no terminal.
				</p>
			</header>

			<section class="popup__section">
				<span class="popup__label" id="clone-target-label"
					>Clone destination</span
				>
				<!-- Destination choices are injected by popup.js from the shared
				     CLONE_TARGETS list (src/lib/clone-targets.ts) as a radiogroup, so
				     the targets live in one typed place and each row carries its own
				     brand icon (or the .zip folder). Kept empty here; populated on
				     load. -->
				<div
					class="popup__options"
					id="clone-target"
					role="radiogroup"
					aria-labelledby="clone-target-label"
				></div>
			</section>

			<footer class="popup__footer">
				<!-- Brand glyphs are inlined as SVG so they ship with the extension —
				     no remote asset, and colours use SVG fill attributes (never an
				     inline style attribute), keeping the popup MV3-CSP compliant. The
				     GitHub mark inherits the foreground colour (black, inverting to
				     white in dark mode); the Chrome logo carries its own brand colours. -->
				<a
					class="popup__link"
					href="https://github.com/AdamAkhlaq/clone-anywhere-for-github"
					target="_blank"
					rel="noopener noreferrer"
				>
					<svg
						class="popup__link-icon popup__link-icon--github"
						viewBox="0 0 16 16"
						width="15"
						height="15"
						fill="currentColor"
						aria-hidden="true"
						focusable="false"
					>
						<use href="#gh-mark" />
					</svg>
					<span>GitHub repository</span>
				</a>
				<a
					class="popup__link"
					href="https://chromewebstore.google.com/detail/clone-anywhere-for-github/effhdkonnknoebahhnnciakckbbfmcpi"
					target="_blank"
					rel="noopener noreferrer"
				>
					<svg
						class="popup__link-icon"
						viewBox="0 0 48 48"
						width="15"
						height="15"
						aria-hidden="true"
						focusable="false"
					>
						<defs>
							<linearGradient
								id="gcvsc-chrome-red"
								x1="3.2173"
								y1="15"
								x2="44.7812"
								y2="15"
								gradientUnits="userSpaceOnUse"
							>
								<stop offset="0" stop-color="#d93025" />
								<stop offset="1" stop-color="#ea4335" />
							</linearGradient>
							<linearGradient
								id="gcvsc-chrome-yellow"
								x1="20.7219"
								y1="47.6791"
								x2="41.5039"
								y2="11.6837"
								gradientUnits="userSpaceOnUse"
							>
								<stop offset="0" stop-color="#fcc934" />
								<stop offset="1" stop-color="#fbbc04" />
							</linearGradient>
							<linearGradient
								id="gcvsc-chrome-green"
								x1="26.5981"
								y1="46.5015"
								x2="5.8161"
								y2="10.506"
								gradientUnits="userSpaceOnUse"
							>
								<stop offset="0" stop-color="#1e8e3e" />
								<stop offset="1" stop-color="#34a853" />
							</linearGradient>
						</defs>
						<circle cx="24" cy="23.9947" r="12" fill="#fff" />
						<path
							d="M24,12H44.7812a23.9939,23.9939,0,0,0-41.5639.0029L13.6079,30l.0093-.0024A11.9852,11.9852,0,0,1,24,12Z"
							fill="url(#gcvsc-chrome-red)"
						/>
						<circle cx="24" cy="24" r="9.5" fill="#1a73e8" />
						<path
							d="M34.3913,30.0029,24.0007,48A23.994,23.994,0,0,0,44.78,12.0031H23.9989l-.0025.0093A11.985,11.985,0,0,1,34.3913,30.0029Z"
							fill="url(#gcvsc-chrome-yellow)"
						/>
						<path
							d="M13.6086,30.0031,3.218,12.006A23.994,23.994,0,0,0,24.0025,48L34.3931,30.0029l-.0067-.0068a11.9852,11.9852,0,0,1-20.7778.007Z"
							fill="url(#gcvsc-chrome-green)"
						/>
					</svg>
					<span>Chrome Web Store</span>
				</a>
			</footer>
		</main>

		<!-- Loaded last so #clone-target exists when the script runs. -->
		<script src="popup.js"></script>
	</body>
</html>
